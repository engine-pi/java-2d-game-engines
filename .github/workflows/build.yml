name: Build

on:
   push:
      branches:
      - master
   pull_request:
      branches:
      - master

jobs:
   windows:
      runs-on: windows-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 17
            mvn-toolchain-id: |
              JavaSE-17
            server-id: ossrh
            server-username: ${{ secrets.MAVEN_USERNAME }}
            server-password: ${{ secrets.MAVEN_PASSWORD }}

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
               ~/.gradle/caches
               ~/.gradle/wrapper
            key: maven-gradle-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-gradle-

      -  name: Keystore
         uses: timheuer/base64-to-file@784a1a4a994315802b7d8e2084e116e783d157be
         with:
            fileName: android.jks
            fileDir: app/
            encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      -  name: GPG
         uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
         with:
            gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            passphrase: ${{ secrets.GPG_PASSPHRASE }}

      -  name: Maven
         uses: coactions/setup-xvfb@b6b4fcfb9f5a895edadc3bc76318fae0ac17c8b3
         with:
            run: mvn clean deploy -U -B -Psign
         env:
            MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_PASSPHRASE }}

      -  name: Prepare Editor Product
         run: rmdir /s /q releng\com.b3dgs.lionengine.editor.product\target\products\com.b3dgs.lionengine.editor.product
         shell: cmd

      -  name: Gradle
         run: |
           cd java/lionengine-core-android
           gradlew publish -Pkeystore=android.jks
         shell: cmd
         env:
           ORG_GRADLE_PROJECT_mavenUsername: ${{ secrets.MAVEN_USERNAME }}
           ORG_GRADLE_PROJECT_mavenPassword: ${{ secrets.MAVEN_PASSWORD }}
           ORG_GRADLE_PROJECT_keystore.alias: ${{ secrets.KEYSTORE_ALIAS }}
           ORG_GRADLE_PROJECT_keystore.storepassword: ${{ secrets.KEYSTORE_STOREPASS }}
           ORG_GRADLE_PROJECT_keystore.password: ${{ secrets.KEYSTORE_PASS }}

      -  name: Repository
         uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
         with:
            server: $FTP_SERVER
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASS }}
            local-dir: releng/com.b3dgs.lionengine.editor.repository/target/repository/

      -  name: Product
         uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
         with:
            server: $FTP_SERVER
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASS }}
            local_dir: releng/com.b3dgs.lionengine.editor.product/target/products/
            server-dir: /product/

      -  name: Upload
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: coverage-windows
            path: '**/target/site/jacoco/jacoco.xml'

   linux:
      runs-on: ubuntu-latest
      needs: windows
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 17
            mvn-toolchain-id: |
              JavaSE-17

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
               ~/.gradle/caches
               ~/.gradle/wrapper
            key: maven-gradle-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-gradle-

      -  name: Download
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: coverage-windows
            path: ./coverage/windows

      -  name: Tests
         uses: coactions/setup-xvfb@b6b4fcfb9f5a895edadc3bc76318fae0ac17c8b3
         with:
            run: |
               mvn test -B
               mkdir -p coverage/linux
               find . -path "*/target/site/jacoco/jacoco.xml" -exec cp {} coverage/linux/ \;

      -  name: Jacoco
         run: |
            curl -L -o jacococli.jar https://repo1.maven.org/maven2/org/jacoco/org.jacoco.cli/0.8.14/org.jacoco.cli-0.8.14-nodeps.jar
            mkdir -p coverage/merged
            java -jar jacococli.jar merge coverage/windows/jacoco.xml coverage/linux/jacoco.xml --destfile coverage/merged/jacoco.xml

      -  name: Sonar
         run: mvn sonar:sonar -Dsonar.organization=b3dgs -Dsonar.projectKey=b3dgs_lionengine -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=$SONAR_TOKEN -Dsonar.coverage.jacoco.xmlReportPaths=coverage/merged/jacoco.xml
         env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}