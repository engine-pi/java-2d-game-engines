name: Build

on:
   push:
      branches:
      - master
   pull_request:
      branches:
      - master

env:
   MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
   MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
   MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

jobs:
   core-deploy:
      runs-on: windows-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 25
            mvn-toolchain-id: |
               JavaSE-25

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
            key: maven-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-

      -  name: GPG
         uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
         with:
            gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            passphrase: ${{ secrets.GPG_PASSPHRASE }}

      -  name: Settings
         uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788
         with:
            servers: |
               [
                 {
                   "id": "ossrh",
                   "username": "${{ secrets.MAVEN_USERNAME }}",
                   "password": "${{ secrets.MAVEN_PASSWORD }}",
                   "passphrase": "${{ secrets.GPG_PASSPHRASE }}"
                 }
               ]

      -  name: Maven
         run: |
            mvn clean deploy -U -B -P "core,sign"
            Compress-Archive -Path java/*/target/jacoco.exec -DestinationPath coverage-windows.zip

      -  name: Upload
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: coverage-windows
            path: coverage-windows.zip

   core-test:
      runs-on: ubuntu-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 25
            mvn-toolchain-id: |
               JavaSE-25

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
            key: maven-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-

      -  name: Tests
         run: |
            sudo apt-get update && sudo apt-get install -y xvfb libasound2-dev alsa-utils
            xvfb-run -a mvn clean test -U -B -Pcore
            zip -r coverage-linux.zip java/*/target/jacoco.exec

      -  name: Upload projects
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: src-java
            path: |
               java/**/*.java
               java/**/*.class
               !**/target/generated-sources/**
               !**/target/maven-status/**
               !**/target/test-classes/**
               !**/.git/**

      -  name: Upload
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: coverage-linux
            path: coverage-linux.zip

   android:
      runs-on: ubuntu-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 17
            mvn-toolchain-id: |
               JavaSE-17

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
               ~/.gradle/wrapper
            key: gradle-${{ hashFiles('**/build.gradle') }}
            restore-keys: |
               gradle-

      -  name: Keystore
         run: printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > java/lionengine-core-android/android.jks

      -  name: GPG
         uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
         with:
            gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            passphrase: ${{ secrets.GPG_PASSPHRASE }}

      -  name: Settings
         uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788
         with:
            servers: |
               [
                 {
                   "id": "ossrh",
                   "username": "${{ secrets.MAVEN_USERNAME }}",
                   "password": "${{ secrets.MAVEN_PASSWORD }}",
                   "passphrase": "${{ secrets.GPG_PASSPHRASE }}"
                 }
               ]

      -  name: Maven
         run: mvn clean install -U -B -P "android,sign"

      -  name: Gradle
         run: |
            cd java/lionengine-core-android
            chmod +x gradlew
            ./gradlew publish -Pkeystore=android.jks
         env:
            ORG_GRADLE_PROJECT_mavenUsername: ${{ secrets.MAVEN_USERNAME }}
            ORG_GRADLE_PROJECT_mavenPassword: ${{ secrets.MAVEN_PASSWORD }}
            ORG_GRADLE_PROJECT_keystore.alias: ${{ secrets.KEYSTORE_ALIAS }}
            ORG_GRADLE_PROJECT_keystore.storepassword: ${{ secrets.KEYSTORE_STOREPASS }}
            ORG_GRADLE_PROJECT_keystore.password: ${{ secrets.KEYSTORE_PASS }}

   editor:
      runs-on: windows-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 17
            mvn-toolchain-id: |
               JavaSE-17

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
            key: maven-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-

      -  name: GPG
         uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
         with:
            gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            passphrase: ${{ secrets.GPG_PASSPHRASE }}

      -  name: Settings
         uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788
         with:
            servers: |
               [
                 {
                   "id": "ossrh",
                   "username": "${{ secrets.MAVEN_USERNAME }}",
                   "password": "${{ secrets.MAVEN_PASSWORD }}",
                   "passphrase": "${{ secrets.GPG_PASSPHRASE }}"
                 }
               ]

      -  name: Maven
         run: |
            mvn clean install -U -B -P "editor,sign"
            Compress-Archive -Path plugins\*\target\jacoco.exec,tests\*\target\jacoco.exec -DestinationPath coverage-editor.zip
            Remove-Item -Recurse -Force releng\com.b3dgs.lionengine.editor.product\target\products\com.b3dgs.lionengine.editor.product

      -  name: Repository
         uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
         with:
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASS }}
            local-dir: releng/com.b3dgs.lionengine.editor.repository/target/repository/

      -  name: Product
         uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
         with:
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASS }}
            local-dir: releng/com.b3dgs.lionengine.editor.product/target/products/
            server-dir: /product/

      -  name: Upload projects
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: src-editor
            path: |
               plugins/**/*.pom
               plugins/**/*.java
               plugins/**/*.class
               tests/**/*.pom
               tests/**/*.java
               tests/**/*.class
               releng/**/*.pom
               releng/**/*.pom
               !**/target/generated-sources/**
               !**/target/maven-status/**
               !**/target/test-classes/**
               !**/.git/**

      -  name: Upload
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: coverage-editor
            path: coverage-editor.zip

   sonar:
      runs-on: ubuntu-latest
      needs:
      - core-deploy
      - core-test
      - editor

      steps:
      -  name: Sources Java
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: src-java
            path: .

      -  name: Sources Editor
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: src-editor
            path: .

      -  name: Windows
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: coverage-windows
            path: ./coverage/windows

      -  name: Linux
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: coverage-linux
            path: ./coverage/linux

      -  name: Editor
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: coverage-editor
            path: ./coverage/editor

      -  name: Jacoco
         run: |
            unzip -o ./coverage/windows/coverage-windows.zip -d coverage/windows
            unzip -o ./coverage/linux/coverage-linux.zip -d coverage/linux
            unzip -o ./coverage/editor/coverage-editor.zip -d coverage/editor
            curl -L -o jacococli.jar https://repo1.maven.org/maven2/org/jacoco/org.jacoco.cli/0.8.14/org.jacoco.cli-0.8.14-nodeps.jar
            mkdir -p coverage/merged
            mkdir -p coverage/merged/html
            EXEC_FILES=$(find coverage -name "*.exec")
            java -jar jacococli.jar merge $EXEC_FILES --destfile coverage/merged/jacoco.exec
            CLASS_DIRS=$(find java plugins -type d -path "*/target/classes")
            CLASS_ARGS=$(printf " --classfiles %s" $CLASS_DIRS)
            java -jar jacococli.jar report coverage/merged/jacoco.exec \
               $CLASS_ARGS \
               --sourcefiles java \
               --sourcefiles plugins \
               --sourcefiles releng \
               --xml coverage/merged/jacoco.xml \
               --html coverage/merged/html

      -  name: Sonar
         run: mvn sonar:sonar -Dsonar.organization=b3dgs -Dsonar.projectKey=b3dgs_lionengine -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=$SONAR_TOKEN -Dsonar.coverage.jacoco.xmlReportPaths=coverage/merged/jacoco.xml
         env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}