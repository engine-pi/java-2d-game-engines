name: Build

on:
   push:
      branches:
      - master
   pull_request:
      branches:
      - master

env:
   MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
   MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
   MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

jobs:
   core-deploy:
      runs-on: windows-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 25
            mvn-toolchain-id: |
               JavaSE-25

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
            key: maven-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-

      -  name: GPG
         uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
         with:
            gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            passphrase: ${{ secrets.GPG_PASSPHRASE }}

      -  name: Settings
         uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788
         with:
            servers: |
               [
                 {
                   "id": "ossrh",
                   "username": "${{ secrets.MAVEN_USERNAME }}",
                   "password": "${{ secrets.MAVEN_PASSWORD }}",
                   "passphrase": "${{ secrets.GPG_PASSPHRASE }}"
                 }
               ]

      -  name: Maven
         run: mvn clean deploy -U -B -P "core,sign"

      -  name: Zip
         run: |
            $zipDir = "tmp_zip"
            New-Item -ItemType Directory -Force -Path $zipDir
            $files = Get-ChildItem -Path java -Recurse -Filter jacoco.exec
            foreach ($f in $files) {
                $relPath = $f.FullName.Substring($PWD.Path.Length+1)
                $dest = Join-Path $zipDir $relPath
                New-Item -ItemType Directory -Force -Path (Split-Path $dest)
                Copy-Item $f.FullName $dest
            }
            Compress-Archive -Path "$zipDir\*" -DestinationPath jacoco-windows.zip -Force
            Remove-Item -Recurse -Force $zipDir

      -  name: Upload projects
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: class-java
            path: |
               java/**/*.class
               !**/target/generated-sources/**
               !**/target/maven-status/**
               !**/target/test-classes/**
               !**/.git/**

      -  name: Upload
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: jacoco-windows
            path: jacoco-windows.zip

   core-test:
      runs-on: ubuntu-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 25
            mvn-toolchain-id: |
               JavaSE-25

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
            key: maven-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-

      -  name: Install
         run: sudo apt-get update && sudo apt-get install -y xvfb libasound2-dev alsa-utils

      -  name: Tests
         run: xvfb-run -a mvn clean test -U -B -Pcore

      -  name: Zip
         run: zip -r jacoco-linux.zip java/*/target -i "*/jacoco.exec"

      -  name: Upload
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: jacoco-linux
            path: jacoco-linux.zip

   android:
      runs-on: ubuntu-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 17
            mvn-toolchain-id: |
               JavaSE-17

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
               ~/.gradle/wrapper
            key: gradle-${{ hashFiles('**/build.gradle') }}
            restore-keys: |
               gradle-

      -  name: Keystore
         run: printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > java/lionengine-core-android/android.jks

      -  name: GPG
         uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
         with:
            gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            passphrase: ${{ secrets.GPG_PASSPHRASE }}

      -  name: Settings
         uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788
         with:
            servers: |
               [
                 {
                   "id": "ossrh",
                   "username": "${{ secrets.MAVEN_USERNAME }}",
                   "password": "${{ secrets.MAVEN_PASSWORD }}",
                   "passphrase": "${{ secrets.GPG_PASSPHRASE }}"
                 }
               ]

      -  name: Maven
         run: mvn clean install -U -B -P "android,sign"

      -  name: Gradle
         run: |
            cd java/lionengine-core-android
            chmod +x gradlew
            ./gradlew publish -Pkeystore=android.jks
         env:
            ORG_GRADLE_PROJECT_mavenUsername: ${{ secrets.MAVEN_USERNAME }}
            ORG_GRADLE_PROJECT_mavenPassword: ${{ secrets.MAVEN_PASSWORD }}
            ORG_GRADLE_PROJECT_keystore.alias: ${{ secrets.KEYSTORE_ALIAS }}
            ORG_GRADLE_PROJECT_keystore.storepassword: ${{ secrets.KEYSTORE_STOREPASS }}
            ORG_GRADLE_PROJECT_keystore.password: ${{ secrets.KEYSTORE_PASS }}

   editor:
      runs-on: windows-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 17
            mvn-toolchain-id: |
               JavaSE-17

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
            key: maven-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-

      -  name: GPG
         uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
         with:
            gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            passphrase: ${{ secrets.GPG_PASSPHRASE }}

      -  name: Settings
         uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788
         with:
            servers: |
               [
                 {
                   "id": "ossrh",
                   "username": "${{ secrets.MAVEN_USERNAME }}",
                   "password": "${{ secrets.MAVEN_PASSWORD }}",
                   "passphrase": "${{ secrets.GPG_PASSPHRASE }}"
                 }
               ]

      -  name: Maven
         run: mvn clean install -U -B -P "editor,sign"

      -  name: Zip
         run: |
            Remove-Item -Recurse -Force releng\com.b3dgs.lionengine.editor.product\target\products\com.b3dgs.lionengine.editor.product
            $zipDir = "tmp_zip"
            New-Item -ItemType Directory -Force -Path $zipDir
            $files = Get-ChildItem -Path plugins, tests -Recurse -Filter jacoco.exec
            foreach ($f in $files) {
                $relPath = $f.FullName.Substring($PWD.Path.Length+1)
                $dest = Join-Path $zipDir $relPath
                New-Item -ItemType Directory -Force -Path (Split-Path $dest)
                Copy-Item $f.FullName $dest
            }
            Compress-Archive -Path "$zipDir\*" -DestinationPath jacoco-editor.zip -Force
            Remove-Item -Recurse -Force $zipDir

      -  name: Upload projects
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: class-editor
            path: |
               plugins/**/*.class
               tests/**/*.class
               !**/target/generated-sources/**
               !**/target/maven-status/**
               !**/target/test-classes/**
               !**/.git/**

      -  name: Upload
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: jacoco-editor
            path: jacoco-editor.zip

      -  name: Repository
         uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
         with:
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASS }}
            local-dir: releng/com.b3dgs.lionengine.editor.repository/target/repository/

      -  name: Product
         uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
         with:
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASS }}
            local-dir: releng/com.b3dgs.lionengine.editor.product/target/products/
            server-dir: /product/

   sonar:
      runs-on: ubuntu-latest
      needs:
      - core-deploy
      - core-test
      - editor

      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false
      
      -  name: Sources Java
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: class-java
            path: class-java

      -  name: Sources Editor
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: class-editor
            path: class-editor

      -  name: Windows
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: jacoco-windows
            path: ./jacoco/windows

      -  name: Linux
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: jacoco-linux
            path: ./jacoco/linux

      -  name: Editor
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: jacoco-editor
            path: ./jacoco/editor

      -  name: Jacoco
         run: |
            mkdir -p jacoco/merged/html
            shopt -s dotglob
            cp -r class-java/* .
            cp -r class-editor/* .
            unzip -o ./jacoco/windows/jacoco-windows.zip -d jacoco/windows
            unzip -o ./jacoco/linux/jacoco-linux.zip -d jacoco/linux
            unzip -o ./jacoco/editor/jacoco-editor.zip -d jacoco/editor
            curl -L -o jacococli.jar https://repo1.maven.org/maven2/org/jacoco/org.jacoco.cli/0.8.14/org.jacoco.cli-0.8.14-nodeps.jar
            echo "ls"
            ls
            EXEC_FILES=$(find jacoco -name "*.exec")
            echo "exec files:"
            echo "$EXEC_FILES"
            java -jar jacococli.jar merge $EXEC_FILES --destfile jacoco/merged/jacoco.exec
            CLASS_DIRS=$(find java plugins -type d -path "*/target/classes" 2>/dev/null || true)
            echo "class dir:"
            echo "$CLASS_DIRS"
            CLASS_ARGS=$(printf " --classfiles %s" $CLASS_DIRS)
            java -jar jacococli.jar report jacoco/merged/jacoco.exec \
               $CLASS_ARGS \
               --sourcefiles java \
               --sourcefiles plugins \
               --sourcefiles releng \
               --xml jacoco/merged/jacoco.xml \
               --html jacoco/merged/html

      -  name: Sonar
         run: mvn sonar:sonar -Dsonar.organization=b3dgs -Dsonar.projectKey=b3dgs_lionengine -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=$SONAR_TOKEN -Dsonar.coverage.jacoco.xmlReportPaths=jacoco/merged/jacoco.xml
         env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}