name: Build

on:
   push:
      branches:
      - master
   pull_request:
      branches:
      - master

env:
  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

jobs:
   windows:
      runs-on: windows-latest
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 17
            mvn-toolchain-id: |
              JavaSE-17

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
               ~/.gradle/wrapper
            key: maven-gradle-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-gradle-

      -  name: Keystore
         shell: pwsh
         run: |
            New-Item -ItemType Directory -Force -Path app
            $decoded = [System.Convert]::FromBase64String("${{ secrets.KEYSTORE_BASE64 }}")
            [IO.File]::WriteAllBytes("app/android.jks", $decoded)

      -  name: GPG
         uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
         with:
            gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            passphrase: ${{ secrets.GPG_PASSPHRASE }}

      -  name: Settings
         uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788
         with:
           servers: |
             [
               {
                 "id": "ossrh",
                 "username": "${{ secrets.MAVEN_USERNAME }}",
                 "password": "${{ secrets.MAVEN_PASSWORD }}",
                 "passphrase": "${{ secrets.GPG_PASSPHRASE }}"
               }
             ]

      -  name: Maven
         run: mvn clean deploy -U -B -P "full,sign"
         shell: pwsh

      -  name: Prepare Editor Product
         run: rmdir /s /q releng\com.b3dgs.lionengine.editor.product\target\products\com.b3dgs.lionengine.editor.product
         shell: cmd

      -  name: Gradle
         run: |
           cd java/lionengine-core-android
           gradlew publish -Pkeystore=android.jks
         shell: cmd
         env:
           ORG_GRADLE_PROJECT_mavenUsername: ${{ secrets.MAVEN_USERNAME }}
           ORG_GRADLE_PROJECT_mavenPassword: ${{ secrets.MAVEN_PASSWORD }}
           ORG_GRADLE_PROJECT_keystore.alias: ${{ secrets.KEYSTORE_ALIAS }}
           ORG_GRADLE_PROJECT_keystore.storepassword: ${{ secrets.KEYSTORE_STOREPASS }}
           ORG_GRADLE_PROJECT_keystore.password: ${{ secrets.KEYSTORE_PASS }}

      -  name: Repository
         uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
         with:
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASS }}
            local-dir: releng/com.b3dgs.lionengine.editor.repository/target/repository/

      -  name: Product
         uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a
         with:
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASS }}
            local-dir: releng/com.b3dgs.lionengine.editor.product/target/products/
            server-dir: /product/

      -  name: Upload Repo
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
           name: maven-repo
           path: ~/.m2/repository

      -  name: Upload Coverage
         uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
         with:
            name: coverage-windows
            path: '**/target/jacoco.exec'

   linux:
      runs-on: ubuntu-latest
      needs: windows
      steps:
      -  name: Checkout
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
         with:
            ref: master
            fetch-depth: 1
            fetch-tags: false

      -  name: Java
         uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
         with:
            distribution: temurin
            java-version: 17
            mvn-toolchain-id: |
              JavaSE-17

      -  name: Cache
         uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
         with:
            path: |
               ~/.m2/repository
               ~/.gradle/wrapper
            key: maven-gradle-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
               maven-gradle-

      -  name: Download Repo
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
           name: maven-repo
           path: ~/.m2/repository

      -  name: Download Coverage
         uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
         with:
            name: coverage-windows
            path: ./coverage/windows

      -  name: Tests
         run: |
            sudo apt-get update && sudo apt-get install -y xvfb libasound2-dev alsa-utils
            xvfb-run -a mvn test -B -Pcore
            mkdir -p coverage/linux
            mkdir -p coverage/all
            mkdir -p coverage/all
            find coverage/windows -name "jacoco.exec" | while read f; do
                MODULE=$(basename $(dirname $(dirname "$f")))
                cp "$f" "coverage/all/windows_${MODULE}.exec"
            done
            find . -name "jacoco.exec" | while read f; do
                MODULE=$(basename $(dirname $(dirname "$f")))
                cp "$f" "coverage/all/linux_${MODULE}.exec"
            done
            find . -name "jacoco.exec" -exec bash -c 'cp "$0" "coverage/all/linux_$(basename $(dirname $(dirname $0))).exec"' {} \;

      -  name: Jacoco
         run: |
            curl -L -o jacococli.jar https://repo1.maven.org/maven2/org/jacoco/org.jacoco.cli/0.8.14/org.jacoco.cli-0.8.14-nodeps.jar
            mkdir -p coverage/merged
            EXEC_FILES=$(echo coverage/all/*.exec)
            echo "Merging: $EXEC_FILES"
            java -jar jacococli.jar merge $EXEC_FILES --destfile coverage/merged/jacoco.exec
            java -jar jacococli.jar report coverage/merged/jacoco.exec --classfiles java/**/target/classes --classfiles plugins/**/target/classes --sourcefiles java --sourcefiles plugins --xml coverage/merged/jacoco.xml

      -  name: Sonar
         run: mvn sonar:sonar -Dsonar.organization=b3dgs -Dsonar.projectKey=b3dgs_lionengine -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=$SONAR_TOKEN -Dsonar.coverage.jacoco.xmlReportPaths=coverage/merged/jacoco.xml
         env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}